name: Build & Release EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Inject secrets and version from tag
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'.TrimStart('v')
          $src = Get-Content setup_sync.py -Raw

          # Inject version
          $src = $src -replace "VERSION\s*=\s*'[^']+'", "VERSION     = '$tag'"

          # Inject bot token (from GitHub Actions secret)
          $src = $src -replace "'BOT_TOKEN_PLACEHOLDER'", "'${{ secrets.BOT_TOKEN }}'"

          # Inject Discord client ID (from GitHub Actions secret)
          $src = $src -replace "'CLIENT_ID_PLACEHOLDER'", "'${{ secrets.DISCORD_CLIENT_ID }}'"

          # Inject required guild ID (from GitHub Actions secret)
          $src = $src -replace "'GUILD_ID_PLACEHOLDER'", "'${{ secrets.DISCORD_GUILD_ID }}'"

          Set-Content setup_sync.py $src -NoNewline

      - name: Build EXE
        run: python -m PyInstaller sync.spec --noconfirm

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/iRacingSetupSync.exe
          body: |
            ## iRacing Setup Sync ${{ github.ref_name }}

            **Download iRacingSetupSync.exe — no Python or bot token required.**

            ### Setup (one-time per user)
            1. Download and run `iRacingSetupSync.exe`
            2. Click **Login with Discord** and authorise with your Discord account
            3. Click **Start Sync** — setups will appear in `Documents\iRacing\setups\<car>\Discord\`

            ### Notes
            - Backfills the last 30 days of setups on first run
            - Polls for new setups every 60 seconds while running
            - Setups are automatically sorted into the correct car folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
